<div class="form-page">

    <div class="form-card">

        <div class="form-header">

            <h1>{{ employee.empID === 0 ? 'Add Employee' : 'Edit Employee' }}</h1>

<p>
    {{ employee.empID === 0
        ? 'Fill in the employee details below.'
        : 'Update employee information.' }}
</p>

            <p>Fill in the employee details below.</p>

        </div>

        <div class="form-grid">

            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    placeholder="Enter full name"
                    [(ngModel)]="employee.fullName">

            </div>

            <div class="form-group">

                <label>Gender</label>

<select [(ngModel)]="employee.gender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Other">Other</option>
</select>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    placeholder="Enter email"
                    [(ngModel)]="employee.email">

            </div>

            <div class="form-group">

                <label>Phone</label>

                <input
                    type="text"
                    placeholder="Enter phone number"
                    [(ngModel)]="employee.phone">

            </div>
            <div class="form-group">

    <label>Department</label>

    <select [(ngModel)]="employee.deptID">

        <option [value]="1">HR</option>

        <option [value]="2">IT</option>

        <option [value]="3">Finance</option>


    </select>

</div>

            <div class="form-group">

                <label>Salary</label>

                <input
                    type="number"
                    placeholder="Enter salary"
                    [(ngModel)]="employee.salary">

            </div>

        </div>

        <div class="button-group">

            <button class="cancel-btn" routerLink="/employees">
                Cancel
            </button>

            <button class="save-btn" (click)="saveEmployee()">
                Save Employee
            </button>

        </div>

    </div>

</div>
